paths:
  /health:
    get:
      tags: [General]
      summary: Health check
      description: Heartbeat route that returns a fixed response confirming the API is alive.
      responses:
        '200':
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'alive'
