openapi: 3.0.3
info:
  title: TCSS 460 Group 8 API
  description: |
    **Team:** Group 8
    **Deployed URL:** https://tcss460-team-8-api.onrender.com/

    A RESTful API for the TCSS 460 Group 8 project.

    All `/v1/movie` and `/v1/tv` routes proxy the [TMDB API](https://www.themoviedb.org/)
    with the API key hidden server-side. Responses are transformed into simplified summaries.

    **Shared middleware applied to all proxy routes:**
    - `requireEnvVar('TMDB_API_KEY')` — returns `500` if the API key is not configured.
    - Route-specific validation (`requireTitle`, `requireId`, `validateNumericId`, `validateNumericLimit`) — returns `400` on invalid input.
  version: 0.1.0

servers:
  - url: https://tcss460-team-8-api.onrender.com/
    description: Express API server hosted on Render

tags:
  - name: General
    description: General-purpose routes
  - name: Movies
    description: TMDB movie proxy routes — search, details, and popular listings
  - name: TV Series
    description: TMDB TV series proxy routes — search, details, and popular listings

paths:
  # ── General ───────────────────────────────────────────────────

  /health:
    get:
      tags: [General]
      summary: Health check
      description: Heartbeat route that returns a fixed response confirming the API is alive.
      responses:
        '200':
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive

  # ── Movies ────────────────────────────────────────────────────

  /v1/movie/search:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: |
        Searches TMDB for movies matching the given title. Results are transformed
        into a simplified `MovieSummary` shape.

        **Middleware:** `requireEnvVar('TMDB_API_KEY')`, `requireTitle`, `validateNumericLimit`
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Movie title to search for
          example: Inception
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of results to return (must be a positive integer)
          example: 10
      responses:
        '200':
          description: List of matching movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Displaying 10 out of 12 results'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MovieSummary'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingTitle:
                  summary: Missing title
                  value:
                    error: 'Parameter "title" is required (query param)'
                invalidLimit:
                  summary: Invalid limit
                  value:
                    error: 'Parameter "limit" must be a positive integer'
        '500':
          description: TMDB_API_KEY is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach TMDB service

  /v1/movie/details/{id}:
    get:
      tags: [Movies]
      summary: Get movie details by route param
      description: |
        Returns detailed information for a single movie identified by its TMDB ID,
        passed as a route parameter.

        **Middleware:** `requireEnvVar('TMDB_API_KEY')`, `requireId`, `validateNumericId`
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: TMDB movie ID (must be a positive integer)
          example: 27205
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSummary'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingId:
                  summary: Missing ID
                  value:
                    error: 'Parameter "id" is required (query or route param)'
                invalidId:
                  summary: Non-numeric ID
                  value:
                    error: 'Parameter "id" must be a positive integer'
        '500':
          description: TMDB_API_KEY is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach TMDB service

  /v1/movie/details:
    get:
      tags: [Movies]
      summary: Get movie details by query param
      description: |
        Same as `GET /v1/movie/details/{id}` but the TMDB movie ID is passed as
        a query parameter instead of a route parameter.

        **Middleware:** `requireEnvVar('TMDB_API_KEY')`, `requireId`, `validateNumericId`
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: TMDB movie ID (must be a positive integer)
          example: 27205
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSummary'
        '400':
          description: Missing or invalid ID
          content:
