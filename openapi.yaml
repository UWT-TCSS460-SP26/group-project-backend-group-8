# ── Schemas ───────────────────────────────────────────────────

components:
  schemas:
    MovieSummary:
      type: object
      description: Simplified movie object transformed from the TMDB API response
      properties:
        id:
          type: integer
          description: TMDB movie ID
          example: 27205
        title:
          type: string
          description: Movie title
          example: Inception
        synopsis:
          type: string
          description: Brief plot overview
          example: A thief who steals corporate secrets through dream-sharing technology.
        releaseDate:
          type: string
          format: date
          description: Theatrical release date (YYYY-MM-DD)
          example: '2010-07-16'
        posterUrl:
          type: string
          format: uri
          description: Full URL to the original-size poster image
          example: 'https://image.tmdb.org/t/p/original/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg'

    TvSeriesSummary:
      type: object
      description: Simplified TV series object transformed from the TMDB API response
      properties:
        id:
          type: integer
          description: TMDB TV series ID
          example: 1396
        title:
          type: string
          description: Series name
          example: Breaking Bad
        synopsis:
          type: string
          description: Brief series overview
          example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
        airDate:
          type: string
          format: date
          description: First air date (YYYY-MM-DD)
          example: '2008-01-20'
        posterUrl:
          type: string
          format: uri
          description: Full URL to the original-size poster image
          example: 'https://image.tmdb.org/t/p/original/ggFHVNu6YYI5L9pCfOacjizRGt.jpg'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: 'An unexpected error occurred'
