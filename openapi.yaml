                  value:
                    error: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach TMDB service

  /v1/movie/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: |
        Returns the current list of popular movies from TMDB, transformed into
        simplified `MovieSummary` objects.

        **Middleware:** `requireEnvVar('TMDB_API_KEY')`, `validateNumericLimit`
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of results to return (must be a positive integer)
          example: 20
      responses:
        '200':
          description: List of popular movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Displaying 20 out of 1125451 results'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MovieSummary'
        '400':
          description: Invalid limit parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidLimit:
                  summary: Invalid Limit
                  value:
                    error: 'Parameter "limit" must be a positive integer'
        '500':
          description: TMDB_API_KEY is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach TMDB service

  # ── TV Series ─────────────────────────────────────────────────

  /v1/tv/search:
    get:
      tags: [TV Series]
      summary: Search TV series by title
      description: |
        Searches TMDB for TV series matching the given title. Results are transformed
